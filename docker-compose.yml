services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cpinsight
      POSTGRES_USER: cpuser
      POSTGRES_PASSWORD: cppass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpuser -d cpinsight"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DJANGO_SECRET_KEY: docker-dev-secret-change-me
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DATABASE_URL: postgres://cpuser:cppass@db:5432/cpinsight
      CORS_ALLOW_ALL: "True"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    environment:
      API_BASE: http://backend:8000/api
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  pgdata:
